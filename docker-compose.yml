# Base compose: PostgreSQL and Redis for the data warehouse and ML services.
# Overrides: docker-compose.dev.yml, docker-compose.integration.yml, docker-compose.monitoring.yml
# Usage: docker-compose up -d postgres redis
#        docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dw_postgres
    # Tuning aligned with infrastructure/docker/postgres/postgresql.conf (not auto-mounted).
    # Larger max_wal_size reduces checkpoint frequency under bulk ETL / WAL-heavy loads.
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_wal_size=4GB
      - -c
      - min_wal_size=1GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-datawarehouse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    shm_size: '1gb'
    networks:
      - dw_network

  redis:
    image: redis:7-alpine
    container_name: dw_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dw_network

networks:
  dw_network:
    driver: bridge

volumes:
  postgres_data:
